<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="console.log(`Cart quantity: ${cartQuantity}`)">
      Show Quantity
    </button>
    <script>
      let cartQuantity = 0;
      function updateCartQuantity(amount) {
        if (!(cartQuantity + amount >= 10)) {
          cartQuantity = cartQuantity + amount;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          alert("The cart is full.");
          return "Denied.";
        }
      }
    </script>

    <button onclick="updateCartQuantity(1)">Add to Cart</button>
    <button onclick="updateCartQuantity(2)">+2</button>
    <button onclick="updateCartQuantity(3)">+3</button>
    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        console.log(`Cart quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>
  </body>
</html>
