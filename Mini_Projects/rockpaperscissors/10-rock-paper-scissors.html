<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <h1 class="title">Rock Paper Scissors</h1>

    <div class="button-row">
      <button class="game-button" onclick="playGame('rock')">
        <img src="images/rock-emoji.png" alt="Rock" />
      </button>
      <button class="game-button" onclick="playGame('paper')">
        <img src="images/paper-emoji.png" alt="Paper" />
      </button>
      <button class="game-button" onclick="playGame('scissors')">
        <img src="images/scissors-emoji.png" alt="Scissors" />
      </button>
    </div>

    <div class="score-board">
      <p class="js-result"></p>
      <p class="js-moves"></p>
      <p class="js-score"></p>
    </div>

    <div class="control-buttons">
      <button class="action-btn" onclick="reset()">Reset score</button>
      <button class="action-btn" onclick="updateScoreElement()">
        Show Scores
      </button>
      <button class="autoplay-btn" onclick="autoPlay()">Autoplay</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
