<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="coin-flip.js"></script>
  </head>
  <body>
    <p>Pick Heads or Tails</p>
    <div class="coin-sides">
      <button onclick="coinSide('heads')" class="game-button">Heads</button>
      <button onclick="coinSide('tails')" class="game-button">Tails</button>
    </div>
    <p>Click to show your choice</p>
    <button onclick="showSide()" class="game-button">Show Side</button>
    <p>Click to Flip Coin</p>
    <button onclick="flipCoin()" class="game-button">Flip Coin</button>
    <p>Click to reset scores</p>
    <button onclick="resetScores()" class="game-button">Reset Scores</button>
    <p>Click to show scores</p>
    <button onclick="showScores()" class="game-button">Show Scores</button>
  </body>
</html>
