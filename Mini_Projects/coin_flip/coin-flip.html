<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Flip Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p>Pick Heads or Tails</p>
    <div class="coin-sides">
      <button class="heads-face-button">Heads</button>
      <button class="tails-face-button">Tails</button>
    </div>

    <p>Click to show your choice</p>
    <button class="coin-side-button">Show Side</button>

    <p>Click to Flip Coin</p>
    <button class="flip-button">Flip Coin</button>

    <p>Click to reset scores</p>
    <button class="reset-button">Reset Scores</button>

    <p>Click to show scores</p>
    <button class="score-button">Show Scores</button>

    <script src="coin-flip.js"></script>
  </body>
</html>
