<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="heading">Calculator</h1>

    <div class="calculator-container">
      <!-- Display block -->
      <div class="display" id="display">
        <div class="display-expression" id="displayExpression"></div>
        <div class="display-result" id="displayText">0</div>
      </div>

      <div class="buttons">
        <!-- Row 1 -->
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-action="/">÷</button>

        <!-- Row 2 -->
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-action="*">×</button>

        <!-- Row 3 -->
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-action="-">−</button>

        <!-- Row 4 -->
        <button data-value="0">0</button>
        <button class="decimal" data-action=".">.</button>
        <button class="operator" data-action="+">+</button>
        <button class="equals" data-action="=">=</button>

        <!-- Row 5 -->
        <button class="reset" data-action="reset">Reset</button>
        <button class="show-result" data-action="show">Show</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
