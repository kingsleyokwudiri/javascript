<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Functions</title>
    <!-- <script src="advanced-functions.js"></script> -->
  </head>
  <body>
    <button onclick="" ; class="js-button">Click</button>
    <script>
      // assigning a variable to the "Click" button
      const buttonElement = document.querySelector(".js-button");
      // you can assign an event to a variable
      const eventListener = () => {
        alert("click");
      };
      // same as onclick="", the word after on is the event, e.g click
      buttonElement.addEventListener("click", () => {
        alert("click");
      });
      // buttonElement.addEventListener("click", () => {
      //   alert("click2");

      // });
      buttonElement.removeEventListener("click", eventListener);
    </script>
  </body>
</html>
