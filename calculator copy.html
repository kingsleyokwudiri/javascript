<!doctype html>
<html>
  <head>
    <title>Calculator</title>
  </head>
  <script>
    function pressAction(action) {
      firstNumber = parseFloat(currentInput);
      activeAction = action;
      currentInput = "";
      console.log("Action chosen: " + action);
    }
    function pressNumber(num) {
      currentInput += num.toString();
      console.log(currentInput);
    }
    function pressEquals() {
      let secondNumber = parseFloat(currentInput);
      let result = 0;
      if (activeAction === "+") {
        result = firstNumber + secondNumber;
      } else if (activeAction === "-") {
        result = firstNumber - secondNumber;
      } else if (activeAction === "*") {
        result = firstNumber * secondNumber;
      } else if (activeAction === "/") {
        result = firstNumber / secondNumber;
      }
      console.log("Answer: " + result);
      alert("Answer: " + result);
      currentInput = result.toString();
      currentInput = 0;
    }
    let calculation = 0;
    let currentInput = "";
    let firstNumber = 0;
    let activeAction = "";
  </script>
  <body>
    <style>
      .heading {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .buttons {
        display: grid;
        justify-content: center;
        align-items: center;
      }
    </style>
    <h1 class="heading">Calculator</h1>
    <div class="buttons">
      <p>
        <button onclick="pressNumber(1)">1</button>
        <button onclick="pressNumber(2)">2</button>
        <button onclick="pressNumber(3)">3</button>
      </p>
      <p>
        <button onclick="pressNumber(4)">4</button>
        <button onclick="pressNumber(5)">5</button>
        <button onclick="pressNumber(6)">6</button>
      </p>

      <p>
        <button onclick="pressNumber(7)">7</button>
        <button onclick="pressNumber(8)">8</button>
        <button onclick="pressNumber(9)">9</button>
      </p>
      <p>
        <button onclick="pressNumber(0)">0</button>
      </p>
      <p>
        <button onclick="pressAction('+')">+</button>
        <button onclick="pressAction('-')">-</button>
        <button onclick="pressAction('*')">*</button>
        <button onclick="pressAction('/')">/</button>
      </p>
      <p>
        <button onclick="pressEquals()">=</button>
      </p>
      <p>
        <button
          onclick="
            currentInput = 0;
            alert('Reset input!');
            console.log('Reset input!');
            console.log(currentInput);
          "
        >
          Reset
        </button>
      </p>
    </div>
  </body>
</html>
