<!doctype html>
<html>
  <head>
    <title>Calculator</title>
  </head>
  <body>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 1.5rem;
        flex-direction: column;
        background: #f0f0f0;
        font-family: Arial, sans-serif;
      }

      .heading {
        display: flex;
        justify-content: center;
        text-align: center;
        margin: 0 0 1.8rem 0;
        width: 100%;
        color: #333;
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 2px;
      }

      .calculator-container {
        max-width: 400px;
        width: 100%;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      /* Display block */
      .display {
        background: #000000;
        color: #fff;
        padding: 20px 24px;
        border-radius: 8px;
        margin-bottom: 20px;
        min-height: 80px;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        font-size: 32px;
        font-weight: 300;
        font-family: "Courier New", monospace;
        word-break: break-all;
        text-align: right;
        box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
      }

      .display .expression {
        font-size: 16px;
        color: #888;
        margin-right: 12px;
        font-weight: 400;
      }

      .display .result {
        color: #fff;
        font-size: 36px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .buttons button {
        padding: 20px;
        font-size: 20px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #f8f9fa;
        color: #333;
        transition: all 0.15s ease;
        font-weight: 500;
        min-height: 60px;
      }

      .buttons button:hover {
        background: #e9ecef;
        transform: scale(1.02);
      }

      .buttons button:active {
        transform: scale(0.95);
        background: #dee2e6;
      }

      /* Number buttons */
      .buttons
        button:not(.operator):not(.equals):not(.reset):not(.show-result) {
        background: #f8f9fa;
      }

      /* Operator buttons */
      .operator {
        background: #e3f2fd !important;
        color: #0d6efd !important;
        font-weight: 700 !important;
      }

      .operator:hover {
        background: #bbdefb !important;
      }

      /* Equals button */
      .equals {
        background: #0d6efd !important;
        color: white !important;
        font-weight: 700 !important;
        font-size: 24px !important;
      }

      .equals:hover {
        background: #0b5ed7 !important;
      }

      /* Reset button */
      .reset {
        background: #dc3545 !important;
        color: white !important;
        font-weight: 600 !important;
      }

      .reset:hover {
        background: #bb2d3b !important;
      }

      /* Show result button */
      .show-result {
        background: #198754 !important;
        color: white !important;
        font-weight: 600 !important;
      }

      .show-result:hover {
        background: #157347 !important;
      }

      /* Zero button takes 2 columns */
      .zero {
        grid-column: span 2 !important;
      }

      /* Responsive adjustments */
      @media (max-width: 420px) {
        .calculator-container {
          padding: 15px;
        }

        .buttons {
          gap: 8px;
        }

        .buttons button {
          padding: 15px;
          font-size: 18px;
          min-height: 50px;
        }

        .heading {
          font-size: 1.5rem;
        }

        .display {
          padding: 16px 20px;
          min-height: 70px;
          font-size: 28px;
        }

        .display .result {
          font-size: 30px;
        }
      }

      @media (max-width: 350px) {
        .buttons button {
          padding: 12px;
          font-size: 16px;
          min-height: 45px;
        }

        .display {
          padding: 12px 16px;
          min-height: 60px;
          font-size: 24px;
        }

        .display .result {
          font-size: 26px;
        }
      }
    </style>

    <h1 class="heading">Calculator</h1>

    <div class="calculator-container">
      <!-- Display block -->
      <div class="display" id="display">
        <span id="displayText">0</span>
      </div>

      <div class="buttons">
        <!-- Row 1 -->
        <button onclick="pressNumber(7)">7</button>
        <button onclick="pressNumber(8)">8</button>
        <button onclick="pressNumber(9)">9</button>
        <button class="operator" onclick="pressAction('/')">÷</button>

        <!-- Row 2 -->
        <button onclick="pressNumber(4)">4</button>
        <button onclick="pressNumber(5)">5</button>
        <button onclick="pressNumber(6)">6</button>
        <button class="operator" onclick="pressAction('*')">×</button>

        <!-- Row 3 -->
        <button onclick="pressNumber(1)">1</button>
        <button onclick="pressNumber(2)">2</button>
        <button onclick="pressNumber(3)">3</button>
        <button class="operator" onclick="pressAction('-')">−</button>

        <!-- Row 4 -->
        <button class="zero" onclick="pressNumber(0)">0</button>
        <button class="operator" onclick="pressAction('+')">+</button>
        <button class="equals" onclick="pressEquals()">=</button>

        <!-- Row 5 -->
        <button class="reset" onclick="resetCalculator()">Reset</button>
        <button class="show-result" onclick="showResult()">Show</button>
      </div>
    </div>

    <script>
      // Get display element
      const displayElement = document.getElementById("displayText");

      // Function to update display
      function updateDisplay(value) {
        if (displayElement) {
          displayElement.textContent = value || "0";
        }
      }

      let currentInput = "";
      let firstNumber = 0;
      let activeAction = "";
      let savedResult = null;
      const storedData = localStorage.getItem("result");
      if (storedData) {
        const parsed = localStorage.getItem("result");
      }
      let result = JSON.parse(localStorage.getItem("result")) || {
        result: "",
      };

      function pressAction(action) {
        if (currentInput === "") {
          alert("Please enter a number");
          return;
        }
        firstNumber = parseFloat(currentInput);
        activeAction = action;
        currentInput = "";
        alert("Action chosen: " + action);
        updateDisplay(action);
      }

      function pressNumber(num) {
        currentInput += num.toString();
        alert("Current input: " + currentInput);
        updateDisplay(currentInput);
      }

      function showResult() {
        if (savedResult !== null && savedResult !== undefined) {
          alert("Saved result: " + savedResult);
          updateDisplay(savedResult);
        } else {
          alert("No saved result found");
          updateDisplay("No result");
        }
      }

      function pressEquals() {
        if (currentInput === "") {
          alert("Please enter a number");
          return;
        }
        let secondNumber = parseFloat(currentInput);
        let result = 0;
        if (activeAction === "+") {
          result = firstNumber + secondNumber;
        } else if (activeAction === "-") {
          result = firstNumber - secondNumber;
        } else if (activeAction === "*") {
          result = firstNumber * secondNumber;
        } else if (activeAction === "/") {
          if (secondNumber === 0) {
            alert("Error: Division by zero is not allowed.");
            updateDisplay("Error");
            return;
          }
          result = firstNumber / secondNumber;
        } else {
          alert("Please select an action first.");
          return;
        }
        currentInput = result.toString();
        savedResult = result;
        localStorage.setItem("result", JSON.stringify(result));
        activeAction = "";
        firstNumber = 0;
        alert("Answer: " + result);
        updateDisplay(result);
      }

      function resetCalculator() {
        currentInput = "";
        firstNumber = 0;
        activeAction = "";
        savedResult = null;
        localStorage.removeItem("result");
        alert("Calculator reset.");
        updateDisplay("0");
      }

      // Initialize display
      updateDisplay("0");
    </script>
  </body>
</html>
